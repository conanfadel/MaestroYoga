<details class="sessions-filters" id="sessions-filters-details">
  <summary class="sessions-filters__summary">
    <span class="sessions-filters__summary-ico" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    </span>
    <span>تصفية وترتيب الجلسات</span>
    <span class="sessions-filters__active-badge" id="sessions-filters-active-badge" hidden>0</span>
  </summary>
  <div class="sessions-filters__body">
    <h3 class="booking-block-heading sessions-filters-title sessions-filters-title--desktop">
      تصفية وترتيب الجلسات
      <span class="sessions-filters__active-badge" id="sessions-filters-active-badge-desktop" hidden>0</span>
    </h3>
    <div class="sessions-filters-grid">
      <div class="field">
        <label for="session-search">بحث بالعنوان أو المدرب</label>
        <input id="session-search" type="search" placeholder="مثال: Flow أو Maya" autocomplete="off" />
      </div>
      <div class="field">
        <label for="session-level">مستوى الجلسة</label>
        <select id="session-level" aria-label="فلتر المستوى">
          <option value="">كل المستويات</option>
          <option value="مبتدئ">مبتدئ</option>
          <option value="متوسط">متوسط</option>
          <option value="متقدم">متقدم</option>
        </select>
      </div>
      <div class="field">
        <label for="session-availability">توفر المقاعد</label>
        <select id="session-availability" aria-label="فلتر المقاعد">
          <option value="">كل الحالات</option>
          <option value="available">المتاح فقط</option>
          <option value="full">الممتلئة فقط</option>
        </select>
      </div>
      <div class="field">
        <label for="session-max-price">حد أعلى للسعر (ر.س)</label>
        <input id="session-max-price" type="number" lang="en" dir="ltr" min="0" step="1" placeholder="اتركه فارغًا لعرض الكل" inputmode="numeric" />
      </div>
      <div class="field">
        <label for="session-sort">ترتيب العرض</label>
        <select id="session-sort" aria-label="الترتيب">
          <option value="time_asc">الأقرب وقتًا</option>
          <option value="price_asc">الأرخص سعرًا</option>
          <option value="price_desc">الأعلى سعرًا</option>
          <option value="availability_desc">الأكثر توفرًا</option>
        </select>
      </div>
    </div>
  </div>
</details>

<div id="upcoming-sessions-wrap" class="upcoming-sessions" hidden aria-live="polite">
  <h3 class="booking-block-heading booking-block-heading--compact upcoming-sessions__title">أقرب جلسات متاحة</h3>
  <div id="upcoming-sessions-list" class="upcoming-sessions__list"></div>
</div>
