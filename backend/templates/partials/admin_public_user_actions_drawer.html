<div
  id="pub-user-drawer-panel"
  class="offcanvas offcanvas-end maestro-user-actions-drawer"
  tabindex="-1"
  aria-labelledby="pub-user-drawer-title"
  data-bs-scroll="true"
>
  <div class="offcanvas-header">
    <h2 id="pub-user-drawer-title" class="offcanvas-title">إجراءات المستخدم</h2>
    <button type="button" class="btn-close btn-close-custom" data-bs-dismiss="offcanvas" aria-label="إغلاق"></button>
  </div>
  <div class="offcanvas-body">
    <p id="pub-user-drawer-meta" class="small drawer-meta-text"></p>
    <div class="admin-offcanvas-actions">
    <form method="post" action="/admin/public-users/toggle-active" data-preserve-scroll="1">
      <input type="hidden" name="public_user_id" class="js-pub-drawer-user-id" value="" />
      <button type="submit" id="pub-drawer-btn-toggle-active" class="plan-admin-btn plan-admin-btn--secondary drawer-action-btn">تفعيل / تعطيل</button>
    </form>
    <form method="post" action="/admin/public-users/toggle-verified" data-preserve-scroll="1">
      <input type="hidden" name="public_user_id" class="js-pub-drawer-user-id" value="" />
      <button type="submit" id="pub-drawer-btn-toggle-verified" class="plan-admin-btn plan-admin-btn--secondary drawer-action-btn">توثيق البريد</button>
    </form>
    <form id="pub-drawer-form-resend" method="post" action="/admin/public-users/resend-verification" data-preserve-scroll="1" style="display:none;">
      <input type="hidden" name="public_user_id" class="js-pub-drawer-user-id" value="" />
      <button type="submit" class="plan-admin-btn plan-admin-btn--secondary warn drawer-action-btn">إعادة إرسال التحقق</button>
    </form>
    <form method="post" action="/admin/public-users/delete" data-preserve-scroll="1" onsubmit="return confirm('تحويل المستخدم إلى حذف Soft؟');">
      <input type="hidden" name="public_user_id" class="js-pub-drawer-user-id" value="" />
      <button type="submit" class="plan-admin-btn plan-admin-btn--danger drawer-action-btn">حذف Soft</button>
    </form>
  </div>
  </div>
</div>
