{% if perm_training_management %}
    <section id="section-training-management" class="accordion">
      <div class="accordion-body">
        <div class="card" style="margin-top:0;">
          <h2 class="admin-booking-block-heading admin-booking-block-heading--flush-top">إدارة التدريبات</h2>
          <div style="display:grid;grid-template-columns:1fr;gap:14px;">
            <div>
              {% if training_tab != 'medical' %}
              <form id="assignment-form" method="post" action="/admin/training/assignments/create" data-preserve-scroll="1" style="border:1px solid rgba(197,160,89,0.35);border-radius:12px;padding:12px;background:#fffdf8;margin-bottom:12px;">
                <div style="max-height:{% if training_selected_muscle == 'mixed' %}min(65vh, 560px){% else %}230px{% endif %};overflow:auto;border:1px solid rgba(45,52,54,0.12);border-radius:10px;padding:8px;background:#fff;">
                  {% for ex in training_exercises %}
                  <div style="padding:6px 6px 8px;border-bottom:1px solid rgba(45,52,54,0.08);">
                    <div class="exercise-intensity-box" data-exercise-id="{{ ex.id }}" style="display:none;margin:8px 0 0 24px;padding:8px;border:1px dashed rgba(16,185,129,0.45);border-radius:8px;background:#f0fdf4;">
                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;max-width:360px;">
                        <div>
                          <label style="margin:0 0 4px;">المجموعات</label>
                          <input class="js-sets-input" data-exercise-id="{{ ex.id }}" type="number" min="1" max="20" step="1" autocomplete="off" lang="en" dir="ltr" value="3" />
                        </div>
                        <div>
                          <label style="margin:0 0 4px;">التكرارات</label>
                          <input class="js-reps-input" data-exercise-id="{{ ex.id }}" type="number" min="1" step="1" autocomplete="off" lang="en" dir="ltr" value="10" />
                        </div>
                      </div>
                    </div>
                  </div>
                  {% endfor %}
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">
                  <div>
                    <label for="assign-duration">مدة التمرين (دقائق)</label>
                    <input id="assign-duration" name="duration_minutes" type="number" min="0" step="1" autocomplete="off" lang="en" dir="ltr" value="0" />
                  </div>
                  <div>
                    <label for="assign-rest">الراحة (ثانية)</label>
                    <input id="assign-rest" name="rest_seconds" type="number" min="0" step="1" autocomplete="off" lang="en" dir="ltr" value="60" />
                  </div>
                  <div>
                    <label for="assign-default-sets">مجموعات افتراضية</label>
                    <input id="assign-default-sets" name="default_sets_count" type="number" min="1" max="20" step="1" autocomplete="off" lang="en" dir="ltr" value="3" />
                  </div>
                </div>
                <button type="submit" style="margin-top:10px;">إرسال الخطة للمتدرب</button>
              </form>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </section>
    {% endif %}
