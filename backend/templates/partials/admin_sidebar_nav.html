{% import "partials/admin_nav_macros.html" as admin_nav %}
<aside class="app-sidebar maestro-sidebar shadow" data-bs-theme="dark" aria-label="التنقل بين أقسام لوحة الإدارة">
  <div class="sidebar-brand">
    <a href="/admin" class="brand-link">
      {% if center and center.logo_url %}
      <img src="{{ center.logo_url }}" alt="" class="brand-image opacity-75 shadow maestro-sidebar-logo" width="36" height="36" decoding="async" />
      {% endif %}
      <span class="brand-text fw-semibold">{{ center.name if center else 'Maestro Yoga' }}</span>
    </a>
  </div>
  <div class="sidebar-wrapper">
    <nav class="mt-2">
      <ul
        class="nav sidebar-menu flex-column"
        role="navigation"
        aria-label="أقسام لوحة الإدارة"
        id="maestro-sidebar-nav"
      >
        {{ admin_nav.admin_nav_clusters('sidebar') }}
      </ul>
    </nav>
  </div>
</aside>
