{% import "partials/admin_nav_macros.html" as admin_nav with context %}
<div
  class="sidebar sidebar-fixed sidebar-lg sidebar-dark border-end maestro-admin-sidebar"
  id="sidebar"
  x-ignore
  lang="ar"
  dir="rtl"
  aria-label="التنقل بين أقسام لوحة الإدارة"
>
  <div class="sidebar-header border-bottom">
    <a href="/admin" class="sidebar-brand text-decoration-none d-flex align-items-center gap-2 px-3 py-2">
      {% if center and center.logo_url %}
      <img src="{{ center.logo_url }}" alt="" width="32" height="32" decoding="async" class="rounded" />
      {% endif %}
      <span class="text-truncate fw-semibold">{{ center.name if center else 'Maestro Yoga' }}</span>
    </a>
  </div>
  <ul class="sidebar-nav" id="maestro-sidebar-nav" role="navigation" aria-label="أقسام لوحة الإدارة">
    {{ admin_nav.admin_nav_clusters('sidebar') }}
  </ul>
</div>
