<div
  id="trash-user-drawer-panel"
  class="offcanvas offcanvas-end maestro-user-actions-drawer"
  tabindex="-1"
  aria-labelledby="trash-user-drawer-title"
  data-bs-scroll="true"
>
  <div class="offcanvas-header">
    <h2 id="trash-user-drawer-title" class="offcanvas-title">إجراءات سلة المحذوفات</h2>
    <button type="button" class="btn-close btn-close-custom" data-bs-dismiss="offcanvas" aria-label="إغلاق"></button>
  </div>
  <div class="offcanvas-body">
    <p id="trash-user-drawer-meta" class="small drawer-meta-text"></p>
    <div class="admin-offcanvas-actions">
    <form method="post" action="/admin/public-users/restore" data-preserve-scroll="1">
      <input type="hidden" name="public_user_id" class="js-trash-drawer-user-id" value="" />
      <button type="submit" class="plan-admin-btn plan-admin-btn--secondary drawer-action-btn">استعادة</button>
    </form>
    <form method="post" action="/admin/public-users/permanent-delete" data-preserve-scroll="1" onsubmit="return confirm('حذف هذا المستخدم نهائياً؟ لا يمكن التراجع.');">
      <input type="hidden" name="public_user_id" class="js-trash-drawer-user-id" value="" />
      <button type="submit" class="plan-admin-btn plan-admin-btn--danger drawer-action-btn">حذف نهائي</button>
    </form>
  </div>
  </div>
</div>
