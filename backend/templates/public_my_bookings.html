<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>حجوزاتي | Maestro Yoga</title>
  {% include '_app_base_stylesheet.html' %}
</head>
<body>
  <main style="max-width: 720px; margin: 2rem auto; padding: 1rem;">
    <h1>حجوزاتي</h1>
    {% if not rows %}
    <p>لا توجد حجوزات لهذا المركز بعد.</p>
    {% else %}
    <table style="width:100%; border-collapse: collapse;">
      <thead>
        <tr><th style="text-align:right;padding:8px;border-bottom:1px solid #ddd;">الجلسة</th><th style="text-align:right;padding:8px;border-bottom:1px solid #ddd;">الوقت</th><th style="text-align:right;padding:8px;border-bottom:1px solid #ddd;">الحالة</th></tr>
      </thead>
      <tbody>
        {% for b, s in rows %}
        <tr>
          <td style="padding:8px;border-bottom:1px solid #eee;">{{ s.title }}</td>
          <td style="padding:8px;border-bottom:1px solid #eee;">{{ s.starts_at }}</td>
          <td style="padding:8px;border-bottom:1px solid #eee;">{{ b.status }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% endif %}
    <p style="margin-top:1.5rem;"><a href="/index?center_id={{ center_id }}">العودة للحجز</a></p>
  </main>
</body>
</html>
