{# تنبيه الوضع الأفقي: أعلى الشاشة لتفادي التداخل مع شريط السلة السفلي #}
<div id="mobile-landscape-hint" class="mobile-landscape-hint" hidden role="status" aria-live="polite" aria-atomic="true">
  <div class="mobile-landscape-hint__inner">
    <span class="mobile-landscape-hint__accent" aria-hidden="true"></span>
    <div class="mobile-landscape-hint__icon-wrap" aria-hidden="true">
      <svg class="mobile-landscape-hint__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 3h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
        <path d="M9 18h6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="mobile-landscape-hint__body">
      <p class="mobile-landscape-hint__eyebrow">مُلاءمة العرض</p>
      <p class="mobile-landscape-hint__text">يُفضَّل التصفُّح عبر <strong>سطح المكتب</strong> عند الإمكان؛ وعلى الجهاز المحمول يُستحسَن <strong>الوضع الأفقي</strong> لتحسين وضوح المحتوى.</p>
    </div>
    <button type="button" class="mobile-landscape-hint__close" aria-label="إغلاق">
      <span aria-hidden="true">×</span>
    </button>
  </div>
</div>
<style>
  .mobile-landscape-hint {
    --mlh-gold: var(--gold, #c5a059);
    --mlh-gold-dark: var(--gold-dark, #9a7b3c);
    --mlh-mint: var(--mint, #aaf0d1);
    --mlh-mint-mid: var(--mint-mid, #7dd3ae);
    --mlh-mint-bg: var(--mint-bg, #e8fcf4);
    --mlh-charcoal: var(--charcoal, #2d3436);
    --mlh-muted: var(--charcoal-muted, #636e72);
    --mlh-white: var(--white, #ffffff);
    position: fixed;
    z-index: 940;
    inset-inline: max(12px, env(safe-area-inset-left, 0px)) max(12px, env(safe-area-inset-right, 0px));
    top: max(10px, env(safe-area-inset-top, 0px) + 6px);
    bottom: auto;
    font-family: "Tajawal", system-ui, sans-serif;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-14px);
    transition: opacity 0.32s ease, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    filter: drop-shadow(0 12px 28px rgba(45, 52, 54, 0.14));
  }
  .mobile-landscape-hint.is-visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .mobile-landscape-hint__inner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: min(520px, 100%);
    margin-inline: auto;
    padding-block: 14px;
    padding-inline: 16px;
    padding-inline-start: 20px;
    border-radius: 18px;
    overflow: hidden;
    background:
      linear-gradient(145deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 253, 251, 0.98) 42%, var(--mlh-mint-bg) 120%);
    border: 1px solid rgba(170, 240, 209, 0.85);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 8px 32px rgba(45, 52, 54, 0.08);
  }
  .mobile-landscape-hint__accent {
    position: absolute;
    inset-inline-start: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, var(--mlh-gold) 0%, var(--mlh-gold-dark) 100%);
  }
  .mobile-landscape-hint__icon-wrap {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, rgba(170, 240, 209, 0.45), rgba(125, 211, 174, 0.35));
    border: 1px solid rgba(125, 211, 174, 0.55);
    color: var(--mlh-gold-dark);
    box-shadow: 0 2px 8px rgba(154, 123, 60, 0.12);
  }
  .mobile-landscape-hint__icon {
    display: block;
  }
  .mobile-landscape-hint__body {
    flex: 1;
    min-width: 0;
    text-align: start;
  }
  .mobile-landscape-hint__eyebrow {
    margin: 0 0 4px;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    color: var(--mlh-mint-mid);
    line-height: 1.2;
  }
  .mobile-landscape-hint__text {
    margin: 0;
    font-size: 0.98rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--mlh-charcoal);
  }
  .mobile-landscape-hint__text strong {
    font-weight: 800;
    color: var(--mlh-gold-dark);
  }
  .mobile-landscape-hint__close {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    margin-block: -4px;
    margin-inline-end: -2px;
    border: none;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.75);
    color: var(--mlh-muted);
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(170, 240, 209, 0.65);
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .mobile-landscape-hint__close:hover {
    background: var(--mlh-white);
    color: var(--mlh-charcoal);
    border-color: var(--mlh-mint-mid);
  }
  @media (prefers-reduced-motion: reduce) {
    .mobile-landscape-hint {
      transition: opacity 0.2s ease;
    }
  }
</style>
<script>
(function () {
  var el = document.getElementById("mobile-landscape-hint");
  if (!el) return;
  var STORAGE_KEY = "maestro_landscape_hint_dismissed";
  var closeBtn = el.querySelector(".mobile-landscape-hint__close");
  var autoHideMs = 30000;
  var autoTimer = null;
  var bannerShown = false;

  function isDesktopLike() {
    return window.matchMedia("(pointer: fine)").matches &&
      window.matchMedia("(min-width: 900px)").matches;
  }

  /** هاتف أو لوحي، وضع عمودي، بعرض نموذجي للأجهزة المحمولة */
  function isTargetPortrait() {
    if (isDesktopLike()) return false;
    var w = window.innerWidth;
    var h = window.innerHeight;
    if (w > 1024) return false;
    return h >= w;
  }

  function clearAutoTimer() {
    if (autoTimer) {
      clearTimeout(autoTimer);
      autoTimer = null;
    }
  }

  function hideVisual() {
    el.classList.remove("is-visible");
    el.setAttribute("hidden", "");
    bannerShown = false;
  }

  function persistDismiss() {
    try {
      sessionStorage.setItem(STORAGE_KEY, "1");
    } catch (e) {}
    clearAutoTimer();
    hideVisual();
  }

  function sync() {
    if (sessionStorage.getItem(STORAGE_KEY) === "1") {
      clearAutoTimer();
      hideVisual();
      return;
    }
    if (!isTargetPortrait()) {
      clearAutoTimer();
      hideVisual();
      return;
    }
    if (!bannerShown) {
      bannerShown = true;
      el.removeAttribute("hidden");
      requestAnimationFrame(function () {
        el.classList.add("is-visible");
      });
      clearAutoTimer();
      autoTimer = setTimeout(persistDismiss, autoHideMs);
    }
  }

  if (closeBtn) {
    closeBtn.addEventListener("click", persistDismiss);
  }
  window.addEventListener("resize", sync);
  window.addEventListener("orientationchange", function () {
    setTimeout(sync, 150);
  });
  sync();
})();
</script>
