{# يظهر على الهواتف (عرض ≤600px) في الوضع العمودي فقط #}
<div id="mobile-landscape-hint" class="mobile-landscape-hint" hidden role="status" aria-live="polite" aria-atomic="true">
  <div class="mobile-landscape-hint__inner">
    <p class="mobile-landscape-hint__text">للاستمتاع بتجربة أفضل، استخدم الوضع الأفقي.</p>
    <button type="button" class="mobile-landscape-hint__close" aria-label="إغلاق">×</button>
  </div>
</div>
<script>
(function () {
  var el = document.getElementById("mobile-landscape-hint");
  if (!el) return;
  var closeBtn = el.querySelector(".mobile-landscape-hint__close");
  var hideTimer = null;
  var dismissTimer = null;
  var STORAGE_KEY = "landscapeHintDismissed";

  function wasDismissed() {
    try {
      return sessionStorage.getItem(STORAGE_KEY) === "1";
    } catch (e) {
      return false;
    }
  }

  function markDismissed() {
    try {
      sessionStorage.setItem(STORAGE_KEY, "1");
    } catch (e) {}
  }

  function isPhonePortrait() {
    if (window.matchMedia("(pointer: fine)").matches && window.matchMedia("(min-width: 900px)").matches) {
      return false;
    }
    var w = window.innerWidth;
    var h = window.innerHeight;
    if (w > 600) return false;
    return h >= w;
  }

  function hideVisual(rememberDismiss) {
    el.classList.remove("is-visible");
    if (hideTimer) {
      clearTimeout(hideTimer);
      hideTimer = null;
    }
    if (dismissTimer) {
      clearTimeout(dismissTimer);
      dismissTimer = null;
    }
    hideTimer = setTimeout(function () {
      el.hidden = true;
      hideTimer = null;
    }, 400);
    if (rememberDismiss) {
      markDismissed();
    }
  }

  function show() {
    if (wasDismissed() || !isPhonePortrait()) return;
    el.hidden = false;
    requestAnimationFrame(function () {
      el.classList.add("is-visible");
    });
    if (dismissTimer) clearTimeout(dismissTimer);
    dismissTimer = setTimeout(function () {
      dismissTimer = null;
      hideVisual(false);
    }, 30000);
  }

  function sync() {
    if (!isPhonePortrait()) {
      if (!el.hidden || el.classList.contains("is-visible")) {
        hideVisual(false);
      }
      return;
    }
    if (wasDismissed()) return;
    if (el.classList.contains("is-visible")) return;
    show();
  }

  window.addEventListener("resize", sync);
  window.addEventListener("orientationchange", function () {
    setTimeout(sync, 100);
  });

  if (!wasDismissed() && isPhonePortrait()) {
    show();
  }

  if (closeBtn) {
    closeBtn.addEventListener("click", function () {
      hideVisual(true);
    });
  }
})();
</script>
