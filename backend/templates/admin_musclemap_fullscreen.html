<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Body Highlighter</title>
  <style>
    body { margin: 0; font-family: "Tajawal", Arial, sans-serif; background: #f8fafc; color: #0f172a; }
    .toolbar { position: sticky; top: 0; z-index: 10; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 12px 14px; background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(148,163,184,0.3); }
    .back-link { text-decoration: none; font-weight: 800; color: #1d4ed8; border: 1px solid rgba(59,130,246,0.35); border-radius: 999px; padding: 7px 12px; background: #eff6ff; }
    .chip { border: 1px solid rgba(15,23,42,0.18); border-radius: 999px; background: #fff; padding: 7px 12px; cursor: pointer; font-weight: 700; }
    .chip[aria-pressed="true"] { background: #ecfdf5; border-color: rgba(16,185,129,0.45); color: #065f46; }
    .stage { width: 100vw; height: calc(100vh - 74px); box-sizing: border-box; padding: 10px 14px; display: grid; grid-template-columns: minmax(360px, 56vh) 1fr; gap: 16px; }
    .viewer { border: 1px solid rgba(148,163,184,0.25); border-radius: 16px; background: #ffffff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #bh-svg { width: 100%; height: 100%; }
    .muscle-shape { fill: #d4d4d4; stroke: #f8fafc; stroke-width: 1.2; cursor: pointer; transition: fill .18s ease; }
    .muscle-shape:hover { fill: #f59e0b; }
    .muscle-shape.active { fill: #ef4444; }
    .panel { border: 1px solid rgba(148,163,184,0.25); border-radius: 16px; background: #fff; padding: 12px; overflow: auto; }
    .muscles-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 8px; margin-top: 8px; }
    .muscle-btn { border: 1px solid rgba(59,130,246,0.35); background: #eff6ff; color: #1e3a8a; border-radius: 10px; padding: 9px 10px; font-weight: 800; cursor: pointer; text-align: center; }
    .muscle-btn.active { background: #ecfdf5; border-color: rgba(16,185,129,0.5); color: #065f46; }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="back-link" href="/admin/training?training_muscle={{ training_selected_muscle|urlencode }}&training_client_q={{ training_client_q|urlencode }}&training_client_id={{ training_client_id }}&training_tab={{ training_tab|urlencode }}&training_plan_view={{ training_plan_view|urlencode }}#section-training-management">العودة للوحة الإدارة</a>
    <button class="chip" type="button" data-map-gender-toggle="female">أنثى</button>
    <button class="chip" type="button" data-map-gender-toggle="male">ذكر</button>
    <button class="chip" type="button" data-map-side-toggle="front">عرض أمامي</button>
    <button class="chip" type="button" data-map-side-toggle="back">عرض خلفي</button>
    <span id="map-state-label" style="font-weight:700;color:#334155;"></span>
  </div>

  <div class="stage">
    <div class="viewer">
      <svg id="bh-svg" xmlns="http://www.w3.org/2000/svg" aria-label="Body highlighter"></svg>
    </div>
    <div class="panel">
      <div id="muscles-grid" class="muscles-grid"></div>
    </div>
  </div>

  <script>
    (function initBodyHighlighterPage() {
      var svg = document.getElementById("bh-svg");
      var label = document.getElementById("map-state-label");
      var grid = document.getElementById("muscles-grid");
      var currentGender = "{{ training_body_gender }}" === "male" ? "male" : "female";
      var currentSide = "{{ training_body_side }}" === "back" ? "back" : "front";
      var selectedMuscle = "{{ training_selected_muscle }}";
      var dataStore = {};

      var viewBoxes = {
        male_front: "0 0 724 1448",
        male_back: "724 0 724 1448",
        female_front: "-50 -40 734 1538",
        female_back: "756 0 774 1448"
      };

      function canonicalMuscle(slug) {
        var s = (slug || "").toLowerCase();
        if (s.indexOf("neck") !== -1 || s.indexOf("head") !== -1) return "neck";
        if (s.indexOf("deltoid") !== -1 || s.indexOf("shoulder") !== -1 || s.indexOf("trapezius") !== -1) return "shoulders";
        if (s.indexOf("chest") !== -1) return "chest";
        if (s.indexOf("abs") !== -1 || s.indexOf("oblique") !== -1 || s.indexOf("core") !== -1) return "core";
        if (s.indexOf("biceps") !== -1 || s.indexOf("triceps") !== -1 || s.indexOf("forearm") !== -1 || s.indexOf("hands") !== -1) return "arms";
        if (s.indexOf("back") !== -1) return "back";
        if (s.indexOf("glute") !== -1 || s.indexOf("hip") !== -1) return "glutes";
        if (s.indexOf("hamstring") !== -1) return "hamstrings";
        if (s.indexOf("quad") !== -1 || s.indexOf("adductor") !== -1) return "quads";
        if (s.indexOf("calves") !== -1 || s.indexOf("tibialis") !== -1 || s.indexOf("ankle") !== -1 || s.indexOf("feet") !== -1) return "calves";
        return s || "core";
      }

      function updateUrlState() {
        var stateUrl = new URL(window.location.href);
        stateUrl.searchParams.set("training_body_gender", currentGender);
        stateUrl.searchParams.set("training_body_side", currentSide);
        history.replaceState(null, "", stateUrl.toString());
      }

      function parseAssetText(raw) {
        var src = raw.replace(/^import[^\n]*\n/gm, "");
        src = src.replace(/export const\s+\w+\s*:\s*BodyPart\[\]\s*=\s*/m, "");
        src = src.trim();
        if (src[src.length - 1] === ";") src = src.slice(0, -1);
        return Function("\"use strict\"; return (" + src + ");")();
      }

      async function loadAsset(url) {
        var res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("Asset fetch failed: " + url);
        return parseAssetText(await res.text());
      }

      function renderButtons(parts) {
        grid.innerHTML = "";
        parts.forEach(function (part) {
          var btn = document.createElement("button");
          btn.className = "muscle-btn";
          btn.type = "button";
          btn.textContent = part.slug;
          btn.setAttribute("data-muscle-slug", part.slug);
          if (canonicalMuscle(part.slug) === selectedMuscle) btn.classList.add("active");
          btn.addEventListener("click", function () {
            selectedMuscle = canonicalMuscle(part.slug);
            goToAdmin(selectedMuscle);
          });
          grid.appendChild(btn);
        });
      }

      function renderBody(parts, key) {
        var vb = viewBoxes[key] || "0 0 724 1448";
        svg.setAttribute("viewBox", vb);
        svg.innerHTML = "";
        var layer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        parts.forEach(function (part) {
          (part.pathArray || []).forEach(function (d) {
            var p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", d);
            p.setAttribute("class", "muscle-shape");
            p.setAttribute("data-muscle-slug", part.slug);
            if (canonicalMuscle(part.slug) === selectedMuscle) p.classList.add("active");
            p.addEventListener("click", function () {
              selectedMuscle = canonicalMuscle(part.slug);
              goToAdmin(selectedMuscle);
            });
            layer.appendChild(p);
          });
        });
        svg.appendChild(layer);
        renderButtons(parts);
      }

      function goToAdmin(muscleKey) {
        var url = new URL("/admin", window.location.origin);
        url.searchParams.set("training_muscle", muscleKey);
        url.searchParams.set("training_client_q", "{{ training_client_q }}");
        url.searchParams.set("training_client_id", "{{ training_client_id }}");
        url.searchParams.set("training_tab", "{{ training_tab }}");
        url.searchParams.set("training_plan_view", "{{ training_plan_view }}");
        url.searchParams.set("training_body_gender", currentGender);
        url.searchParams.set("training_body_side", currentSide);
        url.hash = "section-training-management";
        window.location.href = url.toString();
      }

      function setState(gender, side) {
        currentGender = gender === "male" ? "male" : "female";
        currentSide = side === "back" ? "back" : "front";
        document.querySelectorAll("[data-map-gender-toggle]").forEach(function (btn) {
          var active = btn.getAttribute("data-map-gender-toggle") === currentGender;
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
        document.querySelectorAll("[data-map-side-toggle]").forEach(function (btn) {
          var active = btn.getAttribute("data-map-side-toggle") === currentSide;
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
        label.textContent = (currentGender === "male" ? "ذكر" : "أنثى") + " - " + (currentSide === "back" ? "خلفي" : "أمامي");
        updateUrlState();
        var key = currentGender + "_" + currentSide;
        if (dataStore[key]) renderBody(dataStore[key], key);
      }

      Promise.all([
        loadAsset("/static/vendor/react-native-body-highlighter/assets/bodyFront.ts"),
        loadAsset("/static/vendor/react-native-body-highlighter/assets/bodyBack.ts"),
        loadAsset("/static/vendor/react-native-body-highlighter/assets/bodyFemaleFront.ts"),
        loadAsset("/static/vendor/react-native-body-highlighter/assets/bodyFemaleBack.ts")
      ]).then(function (allData) {
        dataStore.male_front = allData[0];
        dataStore.male_back = allData[1];
        dataStore.female_front = allData[2];
        dataStore.female_back = allData[3];
        setState(currentGender, currentSide);
      }).catch(function (err) {
        console.error(err);
        label.textContent = "فشل تحميل ملفات Body Highlighter";
      });

      document.querySelectorAll("[data-map-gender-toggle]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var g = btn.getAttribute("data-map-gender-toggle");
          if (!g) return;
          setState(g, currentSide);
        });
      });
      document.querySelectorAll("[data-map-side-toggle]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var s = btn.getAttribute("data-map-side-toggle");
          if (!s) return;
          setState(currentGender, s);
        });
      });
    })();
  </script>
  {% include '_force_english_digits.html' %}
</body>
</html>
