<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MuscleMap — عرض مطابق</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: "Tajawal", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(148,163,184,0.28);
    }
    .back-link {
      text-decoration: none;
      font-weight: 800;
      color: #1d4ed8;
      border: 1px solid rgba(59,130,246,0.35);
      border-radius: 999px;
      padding: 7px 12px;
      background: #eff6ff;
    }
    .chip {
      border: 1px solid rgba(15,23,42,0.18);
      border-radius: 999px;
      background: #fff;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .chip[aria-pressed="true"] {
      background: #ecfdf5;
      border-color: rgba(16,185,129,0.45);
      color: #065f46;
    }
    .stage {
      width: 100vw;
      height: calc(100vh - 74px);
      padding: 10px 14px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: minmax(360px, 56vh) 1fr;
      gap: 16px;
    }
    .viewer {
      background: #eef2f7;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,0.25);
    }
    .viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .muscles-panel {
      background: #fff;
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 16px;
      padding: 12px;
      overflow: auto;
    }
    .muscles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .muscle-btn {
      border: 1px solid rgba(59,130,246,0.35);
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: 10px;
      padding: 9px 10px;
      text-align: center;
      font-weight: 800;
      cursor: pointer;
    }
    .muscle-btn.active {
      background: #ecfdf5;
      border-color: rgba(16,185,129,0.5);
      color: #065f46;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="back-link" href="/admin?training_muscle={{ training_selected_muscle|urlencode }}&training_client_q={{ training_client_q|urlencode }}&training_client_id={{ training_client_id }}&training_tab={{ training_tab|urlencode }}&training_plan_view={{ training_plan_view|urlencode }}#section-training-management">العودة للوحة الإدارة</a>
    <button class="chip" type="button" data-map-gender-toggle="female" aria-pressed="true">أنثى</button>
    <button class="chip" type="button" data-map-gender-toggle="male" aria-pressed="false">ذكر</button>
    <button class="chip" type="button" data-map-side-toggle="front" aria-pressed="true">عرض أمامي</button>
    <button class="chip" type="button" data-map-side-toggle="back" aria-pressed="false">عرض خلفي</button>
    <span id="map-state-label" style="font-weight:700;color:#334155;">أنثى - أمامي</span>
  </div>

  <div class="stage">
    <div class="viewer">
      <img id="musclemap-image" alt="MuscleMap official render" />
    </div>
    <div class="muscles-panel">
      <h2 style="margin:0 0 6px;font-size:1.05rem;">اختيار العضلة</h2>
      <p style="margin:0;color:#475569;line-height:1.6;">
        هذه الصفحة تعرض الشكل الرسمي المطابق لـ MuscleMap.
        اختر العضلة من الأزرار التالية لإرسال التصفية إلى لوحة الإدارة.
      </p>
      <div class="muscles-grid">
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'neck' else '' }}" data-muscle-key="neck">الرقبة</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'shoulders' else '' }}" data-muscle-key="shoulders">الأكتاف</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'chest' else '' }}" data-muscle-key="chest">الصدر</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'core' else '' }}" data-muscle-key="core">البطن</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'arms' else '' }}" data-muscle-key="arms">الذراعان</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'back' else '' }}" data-muscle-key="back">الظهر</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'glutes' else '' }}" data-muscle-key="glutes">الألوية</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'hamstrings' else '' }}" data-muscle-key="hamstrings">الخلفية</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'quads' else '' }}" data-muscle-key="quads">الرباعية</button>
        <button class="muscle-btn {{ 'active' if training_selected_muscle == 'calves' else '' }}" data-muscle-key="calves">السمانة</button>
      </div>
    </div>
  </div>

  <script>
    (function initFullscreenMuscleMap() {
      var imageEl = document.getElementById("musclemap-image");
      var genderToggles = document.querySelectorAll("[data-map-gender-toggle]");
      var sideToggles = document.querySelectorAll("[data-map-side-toggle]");
      var stateLabel = document.getElementById("map-state-label");
      var currentGender = "{{ training_body_gender }}" === "male" ? "male" : "female";
      var currentSide = "{{ training_body_side }}" === "back" ? "back" : "front";
      var IMAGE_MAP = {
        female_front: "https://raw.githubusercontent.com/melihcolpan/MuscleMap/main/Screenshots/female_front_highlight.png",
        female_back: "https://raw.githubusercontent.com/melihcolpan/MuscleMap/main/Screenshots/female_back_highlight.png",
        male_front: "https://raw.githubusercontent.com/melihcolpan/MuscleMap/main/Screenshots/male_front_highlight.png",
        male_back: "https://raw.githubusercontent.com/melihcolpan/MuscleMap/main/Screenshots/male_back_highlight.png"
      };

      function setMapState(gender, side) {
        currentGender = gender === "male" ? "male" : "female";
        currentSide = side === "back" ? "back" : "front";
        var imageKey = currentGender + "_" + currentSide;
        if (imageEl && IMAGE_MAP[imageKey]) imageEl.src = IMAGE_MAP[imageKey];
        genderToggles.forEach(function (btn) {
          var active = btn.getAttribute("data-map-gender-toggle") === currentGender;
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
        sideToggles.forEach(function (btn) {
          var active = btn.getAttribute("data-map-side-toggle") === currentSide;
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
        if (stateLabel) {
          stateLabel.textContent = (currentGender === "male" ? "ذكر" : "أنثى") + " - " + (currentSide === "back" ? "خلفي" : "أمامي");
        }
        var stateUrl = new URL(window.location.href);
        stateUrl.searchParams.set("training_body_gender", currentGender);
        stateUrl.searchParams.set("training_body_side", currentSide);
        history.replaceState(null, "", stateUrl.toString());
      }

      genderToggles.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var gender = btn.getAttribute("data-map-gender-toggle");
          if (!gender) return;
          setMapState(gender, currentSide);
        });
      });
      sideToggles.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var side = btn.getAttribute("data-map-side-toggle");
          if (!side) return;
          setMapState(currentGender, side);
        });
      });

      document.querySelectorAll(".muscle-btn[data-muscle-key]").forEach(function (node) {
        node.addEventListener("click", function () {
          var key = node.getAttribute("data-muscle-key");
          if (!key) return;
          var url = new URL("/admin", window.location.origin);
          url.searchParams.set("training_muscle", key);
          url.searchParams.set("training_client_q", "{{ training_client_q }}");
          url.searchParams.set("training_client_id", "{{ training_client_id }}");
          url.searchParams.set("training_tab", "{{ training_tab }}");
          url.searchParams.set("training_plan_view", "{{ training_plan_view }}");
          url.searchParams.set("training_body_gender", currentGender);
          url.searchParams.set("training_body_side", currentSide);
          url.hash = "section-training-management";
          window.location.href = url.toString();
        });
      });

      setMapState(currentGender, currentSide);
    })();
  </script>
</body>
</html>
