<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MuscleMap — وضع ملء الشاشة</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: "Tajawal", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(148,163,184,0.28);
    }
    .back-link {
      text-decoration: none;
      font-weight: 800;
      color: #1d4ed8;
      border: 1px solid rgba(59,130,246,0.35);
      border-radius: 999px;
      padding: 7px 12px;
      background: #eff6ff;
    }
    .chip {
      border: 1px solid rgba(15,23,42,0.18);
      border-radius: 999px;
      background: #fff;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .chip[aria-pressed="true"] {
      background: #ecfdf5;
      border-color: rgba(16,185,129,0.45);
      color: #065f46;
    }
    .stage {
      width: 100vw;
      height: calc(100vh - 74px);
      padding: 8px;
      box-sizing: border-box;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
      margin: 0 auto;
      background: #e2e8f0;
      border-radius: 18px;
    }
    .mm-body {
      fill: #f8fbff;
      stroke: #64748b;
      stroke-width: 2;
    }
    .mm-muscle {
      fill: #93c5fd;
      stroke: #3b82f6;
      stroke-width: 1.2;
      cursor: pointer;
      transition: transform .16s ease, fill .16s ease;
      transform-origin: center;
    }
    .mm-muscle:hover { fill: #60a5fa; transform: scale(1.02); }
    .mm-muscle.active { fill: #0f766e; stroke: #065f46; }
  </style>
</head>

  <div class="toolbar">
    <a class="back-link" href="/admin?training_muscle={{ training_selected_muscle|urlencode }}&training_client_q={{ training_client_q|urlencode }}&training_client_id={{ training_client_id }}&training_tab={{ training_tab|urlencode }}&training_plan_view={{ training_plan_view|urlencode }}#section-training-management">العودة للوحة الإدارة</a>

  <script>
    (function initFullscreenMuscleMap() {
      var genderToggles = document.querySelectorAll("[data-map-gender-toggle]");
      var sideToggles = document.querySelectorAll("[data-map-side-toggle]");
      var mapGroups = document.querySelectorAll("[data-map-gender][data-map-side]");
      var stateLabel = document.getElementById("map-state-label");
      var currentGender = "{{ training_body_gender }}" === "male" ? "male" : "female";
      var currentSide = "{{ training_body_side }}" === "back" ? "back" : "front";

      function setMapState(gender, side) {
        currentGender = gender === "male" ? "male" : "female";
        currentSide = side === "back" ? "back" : "front";
        mapGroups.forEach(function (group) {
          var visible = group.getAttribute("data-map-gender") === currentGender && group.getAttribute("data-map-side") === currentSide;
          group.style.display = visible ? "" : "none";
        });
        genderToggles.forEach(function (btn) {
          var active = btn.getAttribute("data-map-gender-toggle") === currentGender;
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
        sideToggles.forEach(function (btn) {
          var active = btn.getAttribute("data-map-side-toggle") === currentSide;
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
        if (stateLabel) {
          stateLabel.textContent = (currentGender === "male" ? "ذكر" : "أنثى") + " - " + (currentSide === "back" ? "خلفي" : "أمامي");
        }
      }

      genderToggles.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var gender = btn.getAttribute("data-map-gender-toggle");
          if (!gender) return;
          setMapState(gender, currentSide);
        });
      });
      sideToggles.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var side = btn.getAttribute("data-map-side-toggle");
          if (!side) return;
          setMapState(currentGender, side);
        });
      });

      document.querySelectorAll("[data-muscle-key]").forEach(function (node) {
        node.addEventListener("click", function () {
          var key = node.getAttribute("data-muscle-key");
          if (!key) return;
          var url = new URL("/admin", window.location.origin);
          url.searchParams.set("training_muscle", key);
          url.searchParams.set("training_client_q", "{{ training_client_q }}");
          url.searchParams.set("training_client_id", "{{ training_client_id }}");
          url.searchParams.set("training_tab", "{{ training_tab }}");
          url.searchParams.set("training_plan_view", "{{ training_plan_view }}");
          url.searchParams.set("training_body_gender", currentGender);
          url.searchParams.set("training_body_side", currentSide);
          url.hash = "section-training-management";
          window.location.href = url.toString();
        });
      });

      setMapState(currentGender, currentSide);
    })();
  </script>
