<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل دخول الإدارة — Maestro Yoga</title>
  <style>
    body { font-family: system-ui, sans-serif; background: radial-gradient(circle at top right, #ecfdf5, #f0fdfa 40%, #f8fafc); margin: 0; padding: 24px; }
    .card { max-width: 420px; margin: 40px auto; background: #fff; border-radius: 16px; padding: 28px;
      box-shadow: 0 12px 34px rgba(6,95,70,.18); border: 1px solid #a7f3d0; }
    .brand {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
      font-size: .8rem;
      margin-bottom: 10px;
      font-weight: 700;
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; }
    p { color: #5c6478; margin: 0 0 20px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d7dbe8; border-radius: 10px; box-sizing: border-box; }
    button { margin-top: 18px; width: 100%; padding: 12px; border: 0; border-radius: 10px;
      background: linear-gradient(120deg, #0f766e, #10b981); color: #fff; font-weight: 700; cursor: pointer; }
    .err { color: #b91c1c; font-size: 0.9rem; margin-bottom: 8px; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Maestro Yoga Admin</div>
    <h1>لوحة الإدارة</h1>
    <p>سجّل دخولك كمسؤول عن المركز</p>
    {% if request.query_params.get('error') == '1' %}
      <div class="err">البريد أو كلمة المرور غير صحيحة.</div>
    {% endif %}
    {% if request.query_params.get('error') == 'role' %}
      <div class="err">هذا الحساب ليس لديه صلاحية لوحة الإدارة.</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label for="email">البريد الإلكتروني</label>
      <input id="email" name="email" type="email" required autocomplete="username" />
      <label for="password">كلمة المرور</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
      <button type="submit">دخول</button>
    </form>
    <p style="margin-top:18px;font-size:0.9rem;"><a href="/index">← العودة للصفحة العامة</a></p>
  </div>
</body>
</html>
