<script>
  (function forceEnglishDigits() {
    var map = {
      "\u0660": "0", "\u0661": "1", "\u0662": "2", "\u0663": "3", "\u0664": "4",
      "\u0665": "5", "\u0666": "6", "\u0667": "7", "\u0668": "8", "\u0669": "9",
      "\u06F0": "0", "\u06F1": "1", "\u06F2": "2", "\u06F3": "3", "\u06F4": "4",
      "\u06F5": "5", "\u06F6": "6", "\u06F7": "7", "\u06F8": "8", "\u06F9": "9"
    };
    function normalizeDigits(text) {
      return String(text || "").replace(/[\u0660-\u0669\u06F0-\u06F9]/g, function (ch) {
        return map[ch] || ch;
      });
    }
    /** Chromium uses Indic digits in numeric inputs when html lang is Arabic; lang=en on the control fixes display. */
    var NUMERIC_INPUT_SELECTOR = [
      'input[type="number"]',
      'input[type="tel"]',
      'input[type="date"]',
      'input[type="time"]',
      'input[type="datetime-local"]',
      'input[type="week"]',
      'input[type="month"]',
      'input[type="range"]',
      'input[inputmode="numeric"]',
      'input[inputmode="decimal"]',
      'input[inputmode="tel"]'
    ].join(",");
    function stampNumericInputLang(root) {
      if (!root) return;
      var nt = root.nodeType;
      if (nt !== 1 && nt !== 11) return;
      try {
        if (nt === 1 && root.matches && root.matches(NUMERIC_INPUT_SELECTOR)) {
          root.setAttribute("lang", "en");
        }
        if (root.querySelectorAll) {
          var nodes = root.querySelectorAll(NUMERIC_INPUT_SELECTOR);
          for (var i = 0; i < nodes.length; i += 1) nodes[i].setAttribute("lang", "en");
        }
      } catch (e) {}
    }
    function isNumericishInput(el) {
      if (!el || (el.tagName || "").toLowerCase() !== "input") return false;
      var t = (el.type || "").toLowerCase();
      if (t === "number" || t === "tel" || t === "date" || t === "time" || t === "datetime-local" || t === "week" || t === "month" || t === "range") {
        return true;
      }
      var im = (el.getAttribute("inputmode") || "").toLowerCase();
      return im === "numeric" || im === "decimal" || im === "tel";
    }
    function walk(node) {
      if (!node) return;
      var type = node.nodeType;
      if (type === Node.TEXT_NODE) {
        node.nodeValue = normalizeDigits(node.nodeValue);
        return;
      }
      if (type !== Node.ELEMENT_NODE) return;
      var tag = (node.tagName || "").toLowerCase();
      if (tag === "script" || tag === "style") return;
      if (node.hasAttribute("value")) {
        node.setAttribute("value", normalizeDigits(node.getAttribute("value")));
      }
      if (tag === "input" || tag === "textarea") {
        if (typeof node.value === "string") node.value = normalizeDigits(node.value);
        if (typeof node.placeholder === "string") node.placeholder = normalizeDigits(node.placeholder);
      }
      var kids = node.childNodes || [];
      for (var i = 0; i < kids.length; i += 1) walk(kids[i]);
    }
    function normalizeRoot() {
      walk(document.body);
      stampNumericInputLang(document.body);
    }
    normalizeRoot();

    document.addEventListener(
      "input",
      function (ev) {
        var el = ev.target;
        if (!isNumericishInput(el)) return;
        var nv = normalizeDigits(el.value);
        if (nv === el.value) return;
        el.value = nv;
      },
      true
    );

    if (window.MutationObserver && document.body) {
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i += 1) {
          var m = mutations[i];
          if (m.type === "characterData" && m.target) {
            walk(m.target);
            continue;
          }
          var added = m.addedNodes || [];
          for (var j = 0; j < added.length; j += 1) {
            walk(added[j]);
            stampNumericInputLang(added[j]);
          }
        }
      });
      obs.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true,
      });
    }
  })();
</script>
