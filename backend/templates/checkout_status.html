<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c5a059" />
  <link rel="stylesheet" href="/static/css/mobile-enhancements.css" />
  <title>{{ headline }} — Maestro Yoga</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: #f8fafc;
      color: #1e293b;
    }
    .card {
      width: 100%;
      max-width: 26rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 0.75rem; font-size: 1.25rem; }
    p { margin: 0 0 1.25rem; line-height: 1.6; color: #475569; font-size: 0.95rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    a.btn {
      display: inline-block;
      padding: 0.55rem 1rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    a.btn.primary { background: #0d9488; color: #fff; }
    a.btn.ghost { background: #f1f5f9; color: #334155; }
    .badge { font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; }
  </style>
</head>
<body data-refresh-pending="{{ 1 if refresh_pending else 0 }}">
  <div class="card">
    {% if valid_link %}
    <div class="badge">حالة الدفع من النظام</div>
    {% endif %}
    <h1>{{ headline }}</h1>
    <p>{{ body }}</p>
    <div class="actions">
      <a class="btn primary" href="{{ index_href }}">العودة للصفحة الرئيسية</a>
      {% if valid_link and refresh_pending %}
      <a class="btn ghost" href="{{ request.url.path }}?{{ request.url.query }}">تحديث الآن</a>
      {% endif %}
    </div>
  </div>
  <script>
    (function () {
      var el = document.body;
      if (!el) return;
      if (el.getAttribute("data-refresh-pending") !== "1") {
        try {
          sessionStorage.removeItem("checkout_status_poll_n");
        } catch (e) {}
        return;
      }
      var key = "checkout_status_poll_n";
      var n = parseInt(sessionStorage.getItem(key) || "0", 10) || 0;
      if (n >= 18) {
        sessionStorage.removeItem(key);
        return;
      }
      sessionStorage.setItem(key, String(n + 1));
      setTimeout(function () { window.location.reload(); }, 2800);
    })();
  </script>
</body>
</html>
