# اختبارات وتحقق من الصياغة على كل دفع إلى الفرع الرئيسي وطلبات الدمج.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-api.txt -r requirements-dev.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q backend/app tests

      - name: Ruff
        run: python -m ruff check backend/app tests

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
        env:
          DATABASE_URL: sqlite:///./ci_maestro_yoga.db
