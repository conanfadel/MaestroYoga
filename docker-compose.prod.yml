version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maestroyoga_app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    container_name: maestroyoga_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maestroyoga}
      POSTGRES_USER: ${POSTGRES_USER:-maestro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maestro} -d ${POSTGRES_DB:-maestroyoga}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
