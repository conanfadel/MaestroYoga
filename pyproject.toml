[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Unused imports: large legacy surface; remove in small batches (never blanket `ruff check --fix`).
ignore = ["F401"]

[tool.ruff.lint.per-file-ignores]
"backend/app/main.py" = ["E402"]
"backend/app/web_ui/impl_state/__init__.py" = ["F403", "F405"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
ignore_missing_imports = true
explicit_package_bases = true
# Widen to more of backend.app as typing/SQLAlchemy stubs improve.
files = ["backend/app/schemas", "backend/app/role_definitions"]
